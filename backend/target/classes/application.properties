# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (H2 file-based so data persists across restarts) ─────────────────
spring.datasource.url=jdbc:h2:file:./data/financedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=finance-super-secret-key-change-this-in-production-please-make-it-long
app.jwt.expiration-ms=28800000

# ── CORS (React dev server) ───────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.finance=INFO
